name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: TypeScript
            command: bun run typecheck
          - name: Effect diagnostics
            command: bun run effect:check
          - name: ESLint
            command: bun run lint
          - name: Prettier
            command: bun run format:check
          - name: Knip
            command: bun run knip
          - name: Dependency audit
            command: bun run audit
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}

  repository-validation:
    name: Repository integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check pull request diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: git diff --check "$BASE_SHA" "$HEAD_SHA"
      - name: Check push diff
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: git diff --check "$BASE_SHA" "$HEAD_SHA"

  deployment-validation:
    name: Deployment (systemd)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Verify systemd unit
        run: >-
          systemd-analyze --user --recursive-errors=no --man=no --generators=no
          verify deploy/systemd/workflowd.service

  tests:
    name: Tests and changed-line coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out exact head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Bun LCOV
        run: bun run test:coverage
      - name: Require 80% changed executable line coverage
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bun run coverage:changed "$BASE_SHA" "$HEAD_SHA"

  aislop:
    name: AI slop (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
      - name: Run aislop
        env:
          AISLOP_NO_TELEMETRY: "1"
          AISLOP_SKIP_TOOL_DOWNLOAD: "1"
        run: npx --yes aislop@0.13.1 scan --json

  required-checks:
    name: Required checks
    if: always()
    needs:
      - quality
      - repository-validation
      - deployment-validation
      - tests
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Require all blocking checks to pass
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          REPOSITORY_RESULT: ${{ needs.repository-validation.result }}
          DEPLOYMENT_RESULT: ${{ needs.deployment-validation.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
        run: |
          if [[ "$QUALITY_RESULT" != "success" || \
                "$REPOSITORY_RESULT" != "success" || \
                "$DEPLOYMENT_RESULT" != "success" || \
                "$TESTS_RESULT" != "success" ]]; then
            printf 'Quality: %s\nRepository integrity: %s\nDeployment: %s\nTests: %s\n' \
              "$QUALITY_RESULT" "$REPOSITORY_RESULT" "$DEPLOYMENT_RESULT" "$TESTS_RESULT"
            exit 1
          fi
