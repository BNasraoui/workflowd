name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
  pull_request:
    paths:
      - "src/**"
      - "test/**"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run checks
        run: bun run check
      - name: Run aislop pilot
        continue-on-error: true
        env:
          AISLOP_NO_TELEMETRY: "1"
          AISLOP_SKIP_TOOL_DOWNLOAD: "1"
        run: npx --yes aislop@0.13.1 scan --json
